# ============================================================
# Ink Realm Web nginx 配置
# ============================================================
# 职责:
#   1. 托管前端静态文件(dist 产物)
#   2. 反向代理 /api → ink-realm:9688(后端业务)
#   3. 反向代理 /actuator → ink-realm:9688(健康检查/监控)
#   4. gzip 压缩,减少流量(3Mbps 带宽下尤其重要)
#   5. SPA history 路由 fallback 到 index.html
#
# 端口:
#   - 容器内 80,对外由 docker-compose 映射
# ============================================================

server {
    listen       80;
    server_name  _;

    # 字符集
    charset utf-8;

    # 最大上传体积(小说内容、文件上传)
    client_max_body_size 20m;

    # gzip 压缩(3Mbps 带宽下能省一半流量)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript
               application/javascript application/json
               application/xml application/rss+xml
               image/svg+xml;

    # 静态资源 root
    root /usr/share/nginx/html;
    index index.html;

    # ---------- 反向代理:后端 API ----------
    # /api/* → 后端 9688 业务端口
    location /api/ {
        proxy_pass http://ink-realm:9688;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 关键:支持 SSE 长连接(流式 AI 输出)
        proxy_buffering off;              # 不缓冲响应,流式直接透传
        proxy_cache off;
        proxy_read_timeout 600s;          # SSE 长连接 10 分钟
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # ---------- 反向代理:Actuator ----------
    # /actuator/* → 后端 9688(同端口,后端 actuator 也走 9688)
    # 注意:9689 端口不对外,通过 nginx 路由控制访问
    location /actuator/ {
        proxy_pass http://ink-realm:9688;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # 监控端点不流式,正常缓冲
        proxy_read_timeout 30s;
    }

    # ---------- 反向代理:Swagger / OpenAPI ----------
    location /v3/api-docs {
        proxy_pass http://ink-realm:9688;
        proxy_set_header Host $host;
    }
    location /swagger-ui {
        proxy_pass http://ink-realm:9688;
        proxy_set_header Host $host;
    }

    # ---------- 静态资源 ----------
    # 静态资源长缓存(文件名带 hash,改了自动失效)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ---------- SPA history 路由 fallback ----------
    # 所有未匹配的路径都回退到 index.html,让 React Router 处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- 安全头 ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
